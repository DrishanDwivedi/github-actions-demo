name: ci workflow
on:
    push:
jobs:
    build-and-push: #Job ka naam
        runs-on: ubuntu-latest #Github Runner OS (Free)
        steps:
            - name: Checkout code #Step ka naam 
              uses: actions/checkout@v4  #Clone the code into Ubuntu runner
            - name: Set up Docker
              uses: docker/setup-buildx-action@v4 #Docker setup action
            
            - name: Login to DockerHUb
              uses: docker/login-action@v2 #Docker login action //To authenticate with DockerHub
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }} #DockerHub username from secrets
                password: ${{ secrets.DOCKERHUB_TOKEN }} #DockerHub password from secrets 
            
            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:live #Tag for the Docker image

 